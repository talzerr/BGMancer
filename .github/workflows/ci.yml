name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Load test env
        run: cp .env.test .env.local

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Tests + Coverage
        run: npm run test:coverage

      - name: Build
        run: npm run build
