name: Bug Report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out as much detail as you can — it speeds up the fix significantly.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: "When I click Generate, the playlist spins forever and never finishes."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Add games X, Y, Z to the library
        2. Click Generate
        3. See error / unexpected behaviour
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      placeholder: A playlist with 50 tracks should appear.
    validations:
      required: true

  - type: dropdown
    id: llm
    attributes:
      label: LLM provider
      options:
        - Anthropic (Claude)
        - Not applicable
    validations:
      required: true

  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: "e.g. 22.3.0 (run: node --version)"

  - type: input
    id: browser
    attributes:
      label: Browser & OS
      placeholder: "e.g. Chrome 125 on macOS 14"

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error messages
      description: Paste any console output or terminal errors here.
      render: shell
