name: Game / OST Request
description: Request a game to be added to the BGMancer catalog
labels: ["game-request"]
body:
  - type: markdown
    attributes:
      value: |
        Request a game to be added to the catalog. The admin will onboard the soundtrack (fetch tracklist, tag with AI, resolve YouTube videos) so it becomes available for everyone.

  - type: input
    id: title
    attributes:
      label: Game title
      placeholder: "e.g. Hollow Knight"
    validations:
      required: true

  - type: input
    id: store
    attributes:
      label: Store / platform link
      description: Steam, GOG, Nintendo, etc.
      placeholder: "https://store.steampowered.com/app/367520/"

  - type: input
    id: ost
    attributes:
      label: YouTube OST playlist (optional)
      description: Link to the official or most complete OST playlist on YouTube, if you know it.
      placeholder: "https://www.youtube.com/playlist?list=..."

  - type: textarea
    id: why
    attributes:
      label: Why is this a good addition?
      description: Briefly explain what makes this OST worth including (composer, style, iconic tracks, etc.).
      placeholder: "Christopher Larkin's score is widely considered one of the best game OSTs of the decade — ambient, melancholic, great for focus sessions."
    validations:
      required: true
